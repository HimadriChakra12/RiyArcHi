Section "InputClass"
    Identifier "elan trackpoint"
    Driver "libinput"
    MatchIsPointer "on"
    MatchProduct "TrackPoint"

    # TrackPoint needs higher speed — flat profile, tune this
    Option "AccelProfile" "flat"
    Option "AccelSpeed" "0.5"

    # Middle button + TrackPoint = scroll (already enabled via button 2)
    Option "ScrollMethod" "on-button-down"
    Option "ScrollButton" "2"
EndSection
