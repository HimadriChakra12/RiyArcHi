Section "InputClass"
    Identifier "elan touchpad"
    Driver "libinput"
    MatchIsTouchpad "on"

    # Tap-to-click (1f=left, 2f=right, 3f=middle)
    Option "Tapping" "on"
    Option "TappingButtonMap" "lrm"

    # Drag with tap-and-hold
    Option "TappingDrag" "on"
    Option "TappingDragLock" "off"

    # Natural scrolling (reverse if you don't want it)
    Option "NaturalScrolling" "false"

    # Two-finger scroll (already default, but explicit)
    Option "ScrollMethod" "twofinger"

    # Clickfinger method: 1f=left, 2f=right physical click
    # Keep software buttons (current default), or switch to clickfinger:
    # Option "ClickMethod" "clickfinger"

    # Palm rejection while typing (already on, keeping it)
    Option "DisableWhileTyping" "true"

    # Acceleration — flat feels more precise on trackpads
    Option "AccelProfile" "flat"
    Option "AccelSpeed" "0.0"
EndSection
